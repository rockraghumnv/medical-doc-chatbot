<!DOCTYPE html>
<html>
<head>
    <title>Medical Document Explainer</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css')}}"/>
</head>
<body>
    <div class="container-fluid h-100">
        <div class="row justify-content-center h-100">
            <div class="col-md-9 col-xl-7 chat">
                <div class="card doc_card">
                    <div class="card-header msg_head">
                        <div class="user_info">
                            <span>Medical Document Explainer</span>
                            <p>Upload prescription/report image and get a simple explanation</p>
                        </div>
                    </div>
                    <div class="card-body msg_card_body">
                        <form id="docExplainerForm">
                            <div class="form-group">
                                <label class="text-light">Upload Image (jpg, jpeg, png, webp)</label>
                                <input type="file" class="form-control" id="document_image" name="document_image" accept=".jpg,.jpeg,.png,.webp" required>
                            </div>
                            <button type="submit" class="btn btn-success">Explain Document</button>
                        </form>

                        <div class="mt-4" id="resultSection" style="display:none;">
                            <h5 class="text-light">Simple Explanation</h5>
                            <div id="explanationBox" class="result_box"></div>
                        </div>

                        <div class="mt-3 text-warning" id="errorBox"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        $(document).ready(function() {
            $("#docExplainerForm").on("submit", function(event) {
                event.preventDefault();

                const formData = new FormData(this);
                $("#errorBox").text("");
                $("#resultSection").hide();

                $.ajax({
                    url: "/explain-document",
                    type: "POST",
                    data: formData,
                    processData: false,
                    contentType: false
                }).done(function(resp) {
                    if (resp.ok) {
                        $("#explanationBox").text(resp.explanation || "No explanation generated.");
                        $("#resultSection").show();
                    } else {
                        $("#errorBox").text(resp.error || "Something went wrong.");
                    }
                }).fail(function(xhr) {
                    const message = (xhr.responseJSON && xhr.responseJSON.error)
                        ? xhr.responseJSON.error
                        : "Unable to process document right now.";
                    $("#errorBox").text(message);
                });
            });
        });
    </script>
</body>
</html>
